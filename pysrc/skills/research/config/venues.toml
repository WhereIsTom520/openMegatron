strict_top_venue = true

[policy]
updated_at = "2026-06-08"
mode = "realtime-first-with-versioned-fallback"
computer_science_primary = "CCF Recommended International Academic Conferences and Journals, 2022 edition; CCF Chinese High-Quality Journals, 2025 edition where applicable"
management_primary = "Financial Times 50 journals, UT Dallas 24 journals, and widely used ABS/AJG or ABDC journal quality signals where applicable"
journal_partition_primary = "Live CAS/Fenqubiao and Clarivate JCR lookup when available"
journal_partition_fallback = "Latest locally tagged CAS/JCR/CCF/FT50/UTD labels; unknown fields are not treated as proof"
notes = [
  "CAS partition service availability may change; never claim live CAS/JCR verification unless a live lookup succeeds.",
  "Conference entries use CCF A/B/C style tiers where known; journal entries may carry CCF, CAS, JCR, FT50, UTD24, AJG, or ABDC metadata.",
]

[matching]
prefixes = [
  "nature",
  "science",
  "cell",
  "lancet",
  "jama",
  "new england journal of medicine",
  "ieee transactions",
  "acm transactions"
]

